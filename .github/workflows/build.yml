name: Build library

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout our code 
      - name: Checkout code
        uses: actions/checkout@v6

      # Setup NodeJS environment
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
            php-version: 8.2
            extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, soap, intl, gd, exif, iconv, imagick
            coverage: xdebug

      # Validate the Composer files
      - name: Validate composer.json and composer.lock
        run: composer validate

      # Fetch the vendor folder from the cache, keyed off the composer.lock file 
      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      # Run composer install if the vendor folder wasn't cached (based on the current composer.lock file) 
      - name: Install dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --prefer-dist --no-progress

      # install NPM dependencies
      - name: Install NPM dependencies
        run: npm install

      # Rev the version number for the next build
      - name: Rev Version
        id: rev-version
        run: |
          npm --no-git-tag-version version patch
          echo "project_name=$(sed -n -e 's/.*"name": "\(.*\)",.*/\1/p' <<< cat package.json)" >> $GITHUB_OUTPUT
          echo "project_version=$(sed -n -e 's/.*"version": "\(.*\)",.*/\1/p' <<< cat package.json)" >> $GITHUB_OUTPUT

      # Run the build
#      - name: Full build
#        run: |
#          vendor/bin/robo release

      # build the app
      - name: Build
        run: |
          npm run build
          mv ${{ steps.rev-version.outputs.project_name }}.zip ${{ steps.rev-version.outputs.project_name }}-${{ steps.rev-version.outputs.project_version }}.zip
          
      - name: Configure Git user
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      # Save versioned files 
      - name: Commit version files
        id: commit-version
        run: |
          git add package.json package-lock.json composer.json composer.lock
          echo -n "Rev to version $(cat version.txt)" | git commit -F -
          git push
          echo "version-commit-ref=$(git show-ref --heads -s)" >>build.properties
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create Release
        id: create-release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.build-vars.outputs.version }}
          name: Release ${{ steps.build-vars.outputs.version }}
          commit: ${{ env.version-commit-ref }}
          omitBody: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts:
            build/${{ steps.build-vars.outputs.project-name }}_${{ steps.build-vars.outputs.version }}.zip

  dispatch:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    strategy:
      matrix:
        repo: ['RainCitySolutions/wp-plugin-framework']

    steps:
      - name: Dispatch to workflows
        run: |
            curl \
            -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MY_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ matrix.repo }}/dispatches \
            -d '{"event_type": "new_php_lib_event", "client_payload": {}}' 
